#  ◈ HYPRIDLE CONFIGURATION
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

general {
    lock_cmd = quickshell -p ~/.config/hypr/scripts/quickshell/Lock.qml
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

# hermes-vision idle gate: after 60s of no input, flag idle so the screen-memory
# feed stops capturing; clear it the instant you return. (Just a flag file the
# hermes-vision daemon reads — no lock/dim.)
listener {
    timeout = 60
    on-timeout = bash -c 'echo 1 > "$HOME/.cache/hermes-vision-idle"'
    on-resume = bash -c 'echo 0 > "$HOME/.cache/hermes-vision-idle"'
}

listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

listener {
    timeout = 1200
    on-timeout = systemctl suspend
}
