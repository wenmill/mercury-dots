# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  ◈ WINDOW & LAYER RULES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

layerrule {
    name = "lr1"
    match:namespace = ^(volume_osd)$
    no_anim = on
}

layerrule {
    name = "lr2"
    match:namespace = ^(brightness_osd)$
    no_anim = on
}

layerrule {
    name = "lr3"
    match:namespace = hyprpicker
    no_anim = on
}

layerrule {
    name = "lr4"
    match:namespace = qsdock
    no_anim = on
}

layerrule {
    name = "lr5"
    match:namespace = ext-session-lock
    blur = on
    ignore_alpha = 0.2
}

# ─────────────────────────────
# Window rules
# ─────────────────────────────

# (App Launcher rule removed 2026-07-02 — the standalone app-launcher window was
#  consolidated into the toolhub, which lives inside qs-master; the class no
#  longer exists.)

# ───────── MASTER QUICKSHELL CONTAINER ─────────
windowrule {
    name = "master_rule"
    match:title = ^(qs-master)$
    float = on
    no_shadow = on
    no_initial_focus = on
}

# ───────── No hyprbars on shell popups/overlays ─────────
# float_toggle.sh flips hyprbars ON for the whole workspace in float mode, which
# would otherwise draw a title bar on the QML popups/overlays too. These manage
# their own geometry/chrome, so suppress the bar for each (matches the immune set
# in float_toggle.sh). hyprbars registers `hyprbars:no_bar` as a window effect —
# it's only settable via this block form with NO `plugin:` prefix (the modern
# `windowrule =` line and the `plugin:`-prefixed form are both rejected).
windowrule {
    name = "nobar_element"
    match:class = ^(element-matrix-overlay)$
    hyprbars:no_bar = true
}
windowrule {
    name = "nobar_ha"
    match:class = ^(home-assistant-overlay)$
    hyprbars:no_bar = true
}
windowrule {
    name = "nobar_athena"
    match:class = ^(athena)$
    hyprbars:no_bar = true
}
windowrule {
    name = "nobar_quickshell"
    match:class = ^(quickshell)$
    hyprbars:no_bar = true
}
windowrule {
    name = "nobar_qsmaster"
    match:title = ^(qs-master)$
    hyprbars:no_bar = true
}
windowrule {
    name = "nobar_pip"
    match:title = ^(mpv-pip-player)$
    hyprbars:no_bar = true
}

# ───────── Element Matrix Overlay (Qt WebEngine) ─────────
# Transparent Element window rendered over the Matrix panel. Blur MUST be off
# (a translucent window otherwise frosts over).
windowrule {
    name = "element_matrix_overlay"
    match:class = ^(element-matrix-overlay)$
    float = on
    no_blur = on
    no_shadow = on
    # NOTE: focus IS taken on open (no `no_initial_focus`) — the overlay parks
    # itself the moment it loses focus (click-outside-to-close), which only arms
    # after it has been focused once.
    # No border (kills the teal active-border) and start at the exact app-launcher
    # footprint + position so there's no resize/jump on open.
    border_size = 0
    size = 647 577
    # Top-right corner (mirrors the old far-left position: 14px from the edge,
    # snug under the 60px topbar). 3440 - 647 - 14 = 2779 on this monitor.
    move = 2779 62
}

# ───────── Home Assistant Overlay (Qt WebEngine) ─────────
# Transparent HA Lovelace dashboard. Blur off (translucent window otherwise
# frosts). Takes focus on open; parks itself on a hidden workspace when it loses
# focus (click-outside-to-close). Centered on the 3440×1440 monitor at its fixed
# 1500×900 footprint so there's no resize/jump on open.
windowrule {
    name = "home_assistant_overlay"
    match:class = ^(home-assistant-overlay)$
    float = on
    no_blur = on
    no_shadow = on
    border_size = 0
    # Calendar-popup footprint (1450×sf=1674 wide, 510×sf=589 tall). Centred like
    # the calendar/toolhub — at this width it can't sensibly sit "under" the bar
    # button, so it's centred: (3440-1674)/2 = 883.
    size = 1674 589
    move = 883 69
}

# ───────── Athena (Hermes voice-chat terminal, Super+G) ─────────
windowrule {
    name = "athena_voice"
    match:class = ^(athena)$
    float = on
    size = 900 620
    move = 1270 410
}

# (Web Hub Overlay rule removed 2026-07-02 — the PyQt6 obsidian-notes-overlay
#  window was replaced by the standalone obsidian-shell layer-shell app, which
#  positions itself; the class no longer exists.)

# ───────── mpv PiP player (native mpv) ─────────
# Frameless picture-in-picture: float, no blur/shadow/border, bottom-right corner.
# Matched by window TITLE (mpv's Wayland app_id is always "mpv"); pip_toggle.sh
# launches `mpv --title=mpv-pip-player` and `pin`s it across workspaces.
windowrule {
    name = "mpv_pip_player"
    match:title = ^(mpv-pip-player)$
    float = on
    no_blur = on
    no_shadow = on
    border_size = 0
    size = 480 270
    move = 2940 1080
}
