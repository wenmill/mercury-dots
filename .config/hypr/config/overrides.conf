# Workaround: AMD RDNA4 (Navi 44 / RX 9060 XT) + Mesa 26.1 explicit-sync EGL fence bug.
# mpv/VAAPI dmabuf frames trip eglDupNativeFenceFDANDROID -> EGL_BAD_PARAMETER, which
# crashes the renderer (CHyprOpenGLImpl::begin) and takes down the whole session.
#
# Hyprland 0.50+ removed render:explicit_sync (explicit sync is now mandatory), so the
# fix is the Aquamarine no-modifiers path — the official FAQ + AMD crash reports
# recommend this for exactly this fence/dmabuf crash. It disables DRM format modifiers
# (linear buffers), avoiding the broken modifier+fence import on this driver stack.
# NOTE: env changes need a full re-login to take effect (not just `hyprctl reload`).
# Remove once a Mesa/kernel fix for RDNA4 fence handling lands.
# See ~/.claude/plans/crispy-rolling-frost.md
env = AQ_NO_MODIFIERS,1

# The merged floating panel + web hub (Obsidian/Hermes/Dify) as a single
# wlr-layer-shell + WebEngine window — replaces the old Quickshell Floating.qml
# panel and the PyQt6 notes_overlay window. Always-on edge-peek selector; SUPER+O
# pops it open. (Built C++ app; see floating/obsidian-shell/.)
exec-once = ~/.config/hypr/scripts/quickshell/floating/obsidian-shell.sh start

# Gaming overlay passthrough: makes the mpv movies window and the floating AI/notes
# window click-through (clicks land on the game; edge AI-selector disabled). Toggle.
bind = SUPER SHIFT, G, exec, ~/.config/hypr/scripts/overlay_passthrough.sh
# Auto-enable that passthrough whenever the gaming focus mode is on (controller
# prompt / focus selector), and turn it off when gaming ends.
exec-once = ~/.config/hypr/scripts/gaming_passthrough_sync.sh
