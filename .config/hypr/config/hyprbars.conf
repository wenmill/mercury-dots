# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  ◈ HYPRBARS — draggable title bars
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Grab the bar to MOVE the window. The very top edge still resizes (resize_on_border);
# the bar takes precedence over the border within its own area.

plugin {
    hyprbars {
        # Hidden by default (standard/tiled mode). The float toggle flips this to 1
        # when it floats the workspace and back to 0 when it tiles. `enabled` is a live
        # VISIBILITY flag (not a creation gate) as long as the plugin is loaded, so
        # toggling it shows/hides bars on already-open windows.
        enabled = 0
        bar_height = 26
        bar_color = rgb(11111b)
        col.text = rgb(cdd6f4)
        bar_text_size = 11
        bar_text_font = JetBrains Mono
        bar_part_of_window = true
        bar_precedence_over_border = true
        bar_padding = 12
        bar_button_padding = 8

        # Right-side buttons: close (red) and maximize/fullscreen (green).
        hyprbars-button = rgb(f38ba8), 13, , hyprctl dispatch killactive
        hyprbars-button = rgb(a6e3a1), 13, , hyprctl dispatch fullscreen 1
    }
}
